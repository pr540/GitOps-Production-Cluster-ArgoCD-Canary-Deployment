apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-ui
  namespace: demo-namespace
spec:
  replicas: 5
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: argoproj/rollouts-demo:blue
        ports:
        - containerPort: 8080
        env:
        - name: API_ENDPOINT
          value: "http://backend-service:8080"
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 1m} # Traffic 20%, pause for 1 minute
      - setWeight: 40
      - pause: {} # Pause indefinitely until manually promoted in ArgoCD
      - setWeight: 80
      - pause: {duration: 30s}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: demo-namespace
spec:
  selector:
    tier: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
