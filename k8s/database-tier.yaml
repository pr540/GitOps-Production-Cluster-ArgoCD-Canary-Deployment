apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db
  namespace: demo-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: database
  template:
    metadata:
      labels:
        tier: database
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: demo-namespace
spec:
  selector:
    tier: database
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
