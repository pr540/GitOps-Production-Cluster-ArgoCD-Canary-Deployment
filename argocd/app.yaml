apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-canary-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-username/GitOps-Production-Cluster-ArgoCD-Canary-Deployment'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: demo-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
