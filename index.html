<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitOps Control Center</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effect"></div>
    <div class="container">
        <header>
            <div class="logo">🚀 GitOps<span class="highlight">Pro</span></div>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="#">Deployments</a>
                <a href="#">Settings</a>
            </nav>
        </header>

        <main>
            <div class="hero">
                <h1>Production Cluster</h1>
                <p>ArgoCD + Canary Deployments configured correctly.</p>
                <div class="status-badge" id="cluster-health">
                    <span class="pulse"></span> Loading Status...
                </div>
            </div>

            <div class="grid">
                <div class="card glass">
                    <h3>Service Status</h3>
                    <p class="value" id="service-name">Loading...</p>
                    <p class="subtext" id="service-port">Connecting...</p>
                </div>
                <div class="card glass">
                    <h3>Canary Traffic</h3>
                    <p class="value gradient-text" id="canary-traffic">--%</p>
                    <p class="subtext">Live active routing</p>
                </div>
                <div class="card glass">
                    <h3>ArgoCD Sync</h3>
                    <p class="value success" id="argo-status">Waiting...</p>
                    <p class="subtext">Last check: Just now</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Frontend Logic Tier
        // Periodically ping the Backend API Tier to get real-time Database updates
        async function fetchDynamicData() {
            try {
                // Call the Vercel Serverless Function (Backend Tier)
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update UI (Frontend Tier) with Data
                document.getElementById('service-name').innerText = data.serviceName;
                document.getElementById('service-port').innerText = `Port ${data.port} • TCP`;
                document.getElementById('canary-traffic').innerText = `${data.canaryTraffic}%`;
                
                const argoStatusEl = document.getElementById('argo-status');
                argoStatusEl.innerText = data.argoStatus;
                if(data.argoStatus === 'Synced') {
                    argoStatusEl.className = 'value success';
                } else {
                    argoStatusEl.className = 'value gradient-text'; // Orange/Red warning look
                }

                document.getElementById('cluster-health').innerHTML = `
                    <span class="pulse"></span> ${data.clusterHealth}
                `;

            } catch (error) {
                console.error("Backend Error:", error);
            }
        }

        // Fetch immediately, then every 3 seconds to test the multi-tier dynamics!
        fetchDynamicData();
        setInterval(fetchDynamicData, 3000);
    </script>
</body>
</html>
