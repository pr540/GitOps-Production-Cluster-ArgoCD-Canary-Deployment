<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitOps Control Center</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effect"></div>
    <div class="container">
        <header>
            <div class="logo">🚀 GitOps<span class="highlight">Pro</span></div>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="#">Deployments</a>
                <a href="#">Settings</a>
            </nav>
        </header>

        <main>
            <div class="hero">
                <h1>Production Cluster</h1>
                <p>ArgoCD + Canary Deployments configured correctly.</p>
                <div class="status-badge">
                    <span class="pulse"></span> System Operational
                </div>
            </div>

            <div class="grid">
                <div class="card glass">
                    <h3>Service Status</h3>
                    <p class="value">demo-app-service</p>
                    <p class="subtext">Port 80 • TCP</p>
                </div>
                <div class="card glass">
                    <h3>Canary Traffic</h3>
                    <p class="value gradient-text">20%</p>
                    <p class="subtext">Waiting for manual promotion...</p>
                </div>
                <div class="card glass">
                    <h3>ArgoCD Sync</h3>
                    <p class="value success">Synced</p>
                    <p class="subtext">Heathy & Pruned</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
